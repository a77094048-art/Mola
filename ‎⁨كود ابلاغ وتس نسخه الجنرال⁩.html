<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الجنرال</title>
    <style>
        :root {
            --bg: #0b0b0b;
            --card: #111;
            --gold: #d4af37;
            --gold-light: #f1c40f;
            --accent: #c49a1f;
            --text: #e0d6c2;
            --dark-gold: #8b7500;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle at 20% 30%, #1a1a1a, #000);
            color: #ddd;
            font-family: 'Cairo', 'Amiri', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }
        .throne {
            max-width: 820px;
            width: 100%;
            background: #0c0c0c;
            border: 2px solid var(--gold);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3), inset 0 0 30px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }
        .throne::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 22px;
            background: linear-gradient(45deg, #d4af37, #8b7500, #f1c40f, #b8860b);
            z-index: -1;
            animation: glow 4s linear infinite;
        }
        @keyframes glow {
            0% { filter: blur(8px) opacity(0.7); }
            50% { filter: blur(16px) opacity(1); }
            100% { filter: blur(8px) opacity(0.7); }
        }
        .header {
            text-align: center;
            padding: 2rem 1rem 0.5rem;
        }
        .header h1 {
            font-size: 4rem;
            font-weight: 900;
            color: var(--gold);
            font-family: 'Cinzel', 'Amiri', serif;
            text-shadow: 0 0 20px #b8860b;
            letter-spacing: 4px;
            margin: 0;
        }
        .divider {
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0.5rem auto;
        }
        .advice {
            color: #c0a060;
            font-size: 1.2rem;
            font-family: 'Amiri', serif;
            margin: 1rem 0 0.5rem;
            font-style: italic;
            line-height: 1.8;
        }
        .advice .verse {
            font-size: 1.4rem;
            color: var(--gold-light);
            display: block;
        }
        .advice .signature {
            display: block;
            margin-top: 0.3rem;
            font-weight: bold;
            color: var(--gold);
            font-size: 1.3rem;
        }
        .control-panel {
            background: rgba(20,20,20,0.8);
            margin: 1rem 2rem;
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid #3a3a3a;
        }
        .row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .field {
            flex: 1 1 200px;
            margin-bottom: 0.8rem;
        }
        label {
            display: block;
            color: var(--gold);
            font-weight: bold;
            margin-bottom: 0.3rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 1rem;
            transition: border 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--gold);
            outline: none;
            box-shadow: 0 0 10px rgba(212,175,55,0.3);
        }
        .btn-glow {
            background: linear-gradient(135deg, #b8860b, #f1c40f);
            color: #000;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(212,175,55,0.4);
        }
        .btn-glow:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 25px rgba(241,196,15,0.7);
        }
        .result-card {
            margin: 1.5rem 2rem 2rem;
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            display: none;
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-header {
            background: #1a1a1a;
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 16px 16px 0 0;
        }
        .message-header span {
            color: var(--gold);
            font-weight: bold;
        }
        .copy-icon {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .copy-icon:hover {
            background: var(--gold);
            color: #000;
        }
        .message-body {
            padding: 1.5rem;
            background: #0e0e0e;
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #ccc;
            border-radius: 0 0 16px 16px;
            max-height: 300px;
            overflow-y: auto;
            direction: ltr;
            text-align: left;
        }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            padding: 1rem 1.5rem;
            background: #0a0a0a;
            border-top: 1px solid #222;
            border-radius: 0 0 16px 16px;
            justify-content: center;
        }
        .send-btn {
            background: transparent;
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 0.6rem 1.8rem;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        .send-btn:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 20px gold;
        }
        .send-btn.legal { border-color: #c49a1f; color: #c49a1f; }
        .send-btn.legal:hover { background: #c49a1f; color: #000; }
        .send-btn.abuse { border-color: #b8860b; color: #b8860b; }
        .send-btn.abuse:hover { background: #b8860b; color: #fff; }
        .btn-icon { font-size: 1.2rem; }
        .section-advice-bottom {
            text-align: center;
            padding: 0 2rem 2rem;
            color: #8b7500;
            font-size: 0.95rem;
        }
        .counter-badge {
            text-align: center;
            color: var(--gold-light);
            font-size: 0.8rem;
            margin-top: -0.3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="throne">
        <div class="header">
            <h1>الجنرال</h1>
            <div class="divider"></div>
            <div class="advice">
                <span class="verse">﴿ وَاتَّقُوا اللَّهَ ۖ وَيُعَلِّمُكُمُ اللَّهُ ﴾</span>
                <span class="signature">— الجنرال</span>
            </div>
        </div>

        <div class="control-panel">
            <div class="counter-badge" id="reportCounter">⚡ بلاغ #1</div>
            <div class="row">
                <div class="field">
                    <label>🎯 رقم الهدف</label>
                    <input type="text" id="targetNumber" placeholder="+1234567890" value="+1234567890">
                </div>
                <div class="field">
                    <label>📂 نوع المخالفة</label>
                    <select id="violationType">
                        <option value="fraud">احتيال / نصب</option>
                        <option value="harassment">تحرش / تهديد</option>
                        <option value="child">استغلال أطفال</option>
                        <option value="spam">سبام</option>
                        <option value="impersonation">انتحال شخصية</option>
                        <option value="drugs">مخدرات</option>
                        <option value="terrorism">تطرف / عنف</option>
                        <option value="general">بلاغ شامل</option>
                    </select>
                </div>
                <div class="field">
                    <label>✍️ ملاحظتك</label>
                    <textarea id="customNote" rows="2" placeholder="تفاصيل تقوي البلاغ..."></textarea>
                </div>
            </div>
            <div style="text-align: center; margin-top: 0.5rem;">
                <button class="btn-glow" id="generateBtn">⚔️ توليد البلاغ الملكي</button>
            </div>
        </div>

        <div class="result-card" id="resultCard">
            <div class="message-header">
                <span>📨 بلاغ جاهز</span>
                <button class="copy-icon" id="copyMsgBtn">📋 نسخ النص</button>
            </div>
            <div class="message-body" id="messageBody"></div>
            <div class="action-buttons">
                <button class="send-btn" id="sendSupportBtn">
                    <span class="btn-icon">📬</span> إرسال للدعم الفني
                </button>
                <button class="send-btn abuse" id="sendAbuseBtn">
                    <span class="btn-icon">🚨</span> إرسال لقسم الإبلاغ
                </button>
                <button class="send-btn legal" id="sendLegalBtn">
                    <span class="btn-icon">⚖️</span> إرسال للقسم القانوني
                </button>
            </div>
        </div>

        <div class="section-advice-bottom">
            ﴿ إِنَّ اللَّهَ يَأْمُرُ بِالْعَدْلِ وَالْإِحْسَانِ ﴾ — الجنرال
        </div>
    </div>

    <script>
        // ========== صوت اللمسات ==========
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function playClick() {
            try {
                if (!audioCtx) audioCtx = new AudioContext();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.1);
            } catch (e) {}
        }
        document.addEventListener('click', function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }, { once: true });
    </script>

    <script>
        // ========== محرك البلاغات اللانهائية (AI-Style Generator) ==========
        const emailTargets = {
            support: { email: "support@whatsapp.com", name: "الدعم الفني" },
            abuse:   { email: "abuse@whatsapp.com", name: "قسم الإبلاغ عن المخالفات" },
            legal:   { email: "legal@whatsapp.com", name: "القسم القانوني" }
        };

        // كلمات وجمل متغيرة لإنتاج صيغ لا نهائية
        const variations = {
            // مقدمات مختلفة
            greetings: [
                "To the WhatsApp Integrity Team,", "Dear WhatsApp Safety Department,",
                "To Whom It May Concern,", "Attention WhatsApp Trust & Safety,",
                "Dear WhatsApp Legal Division,", "To the WhatsApp Abuse Team,",
                "Esteemed WhatsApp Compliance Officers,", "Urgent – WhatsApp Moderation Team,",
                "For the Immediate Attention of WhatsApp Security,", "To the WhatsApp Policy Enforcement Team,"
            ],
            // وصف المستخدم المُبلَّغ عنه
            perpDescriptions: [
                "the individual", "the user", "the account holder", "this person",
                "the perpetrator", "the offending party", "this malicious actor",
                "the suspect", "this scammer", "the violator", "this harasser",
                "the fraudster", "this criminal", "the offender"
            ],
            // وصف النشاط
            activityVerbs: [
                "is actively engaged in", "has been repeatedly involved in",
                "is systematically conducting", "persists in carrying out",
                "has initiated a campaign of", "is orchestrating", "is responsible for",
                "continues to perform", "has escalated to", "is brazenly committing"
            ],
            // خطورة الموقف
            severityPhrases: [
                "This is a critical violation.", "The severity cannot be overstated.",
                "This poses a direct threat.", "Immediate intervention is imperative.",
                "This warrants urgent attention.", "The matter is extremely serious.",
                "This is a flagrant breach of policy.", "This constitutes a criminal act.",
                "The behavior is escalating dangerously.", "Time is of the essence here."
            ],
            // طلبات الإجراء
            actionRequests: [
                "I demand immediate suspension of this account.",
                "Please terminate this number without delay.",
                "I urge you to permanently ban this user.",
                "This account must be disabled permanently.",
                "Immediate deactivation is required.",
                "Please escalate to your security division.",
                "I request full investigation and account removal.",
                "Suspend this number and preserve all records.",
                "Delete this account and block associated devices.",
                "Take swift enforcement action against this user."
            ],
            // جمل ختامية
            closingLines: [
                "Thank you for your prompt action.", "I trust you will handle this urgently.",
                "Your swift response is appreciated.", "Thank you for protecting the community.",
                "I look forward to confirmation of action taken.", "Please keep me informed of the outcome.",
                "The community relies on your vigilance.", "Thank you for upholding safety standards.",
                "I remain available for any further questions.", "Together we keep the platform safe."
            ]
        };

        // قوالب أساسية حسب النوع
        const offenseDetails = {
            fraud: [
                "soliciting money under false pretenses and distributing phishing links",
                "impersonating a legitimate business and attempting to defraud victims",
                "running an advance-fee scam targeting vulnerable individuals",
                "stealing personal data through fake verification requests",
                "operating a financial scam and tricking people into sending payments",
                "promoting get-rich-quick schemes and investment fraud",
                "sending fake invoices and demanding payment from unsuspecting users",
                "pretending to be a government official and requesting sensitive information"
            ],
            harassment: [
                "sending violent threats and explicit content in a relentless manner",
                "cyberstalking and sending intimidating messages around the clock",
                "using hate speech and making targeted threats based on personal identity",
                "harassing with repeated unwanted calls, messages, and voice notes",
                "threatening physical harm and posting private information",
                "engaging in coordinated harassment with multiple accounts",
                "sending sexually explicit material without consent repeatedly",
                "bullying and intimidating through threatening language"
            ],
            child: [
                "distributing sexually explicit content involving minors",
                "sharing child exploitation material across groups",
                "grooming minors through deceptive conversations",
                "sending inappropriate images to underage users",
                "participating in networks that trade illegal imagery of children",
                "attempting to solicit explicit content from minors",
                "linking to external sites containing CSAM (Child Sexual Abuse Material)",
                "coercing minors into sharing personal photographs"
            ],
            spam: [
                "sending automated spam messages and malicious links at high volume",
                "deploying a bot network to flood inboxes with scam promotions",
                "distributing malware through deceptive links disguised as offers",
                "performing mass-messaging operations advertising fake products",
                "spreading phishing links designed to steal login credentials",
                "running a spam campaign promoting counterfeit goods",
                "flooding groups with unsolicited advertisements for gambling sites",
                "sending chain messages with embedded tracking links"
            ],
            impersonation: [
                "impersonating my identity and contacting my personal network for money",
                "using my name and photograph to create a fake account",
                "pretending to be a family member to solicit emergency funds",
                "masquerading as a celebrity to defraud fans",
                "posing as tech support and requesting remote access to devices",
                "impersonating a bank representative to steal financial details",
                "creating a clone account of my business to deceive customers",
                "using stolen photos to catfish and exploit individuals"
            ],
            drugs: [
                "advertising and selling illegal narcotics openly via stories and groups",
                "promoting controlled substances with price lists and delivery options",
                "coordinating drug deals through encrypted chats and disappearing messages",
                "distributing prescription medication without authorization",
                "running an illicit online pharmacy through WhatsApp",
                "sharing locations for drug pickups and cash transactions",
                "marketing synthetic drugs targeting young users",
                "facilitating the sale of performance-enhancing drugs illegally"
            ],
            terrorism: [
                "spreading extremist propaganda and violent recruitment material",
                "inciting violence and sharing bomb-making instructions",
                "promoting terrorist ideology and radicalizing vulnerable individuals",
                "distributing graphic execution videos to intimidate and recruit",
                "coordinating violent activities through encrypted group chats",
                "glorifying terrorist acts and encouraging copycat attacks",
                "sharing manuals for weapons and tactical assault planning",
                "fundraising for designated terrorist organizations"
            ],
            general: [
                "repeatedly violating WhatsApp's Terms of Service in multiple categories",
                "engaging in a pattern of abusive behavior including fraud and harassment",
                "using the platform for illegal activities spanning several policy violations",
                "demonstrating dangerous behavior that threatens user safety across the board",
                "committing numerous breaches of community guidelines persistently",
                "showing a complete disregard for WhatsApp's acceptable use policy",
                "involved in organized malicious activities targeting the platform",
                "accumulating violations that warrant immediate permanent suspension"
            ]
        };

        let reportCount = 0;

        function pickRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateInfiniteMessage(number, typeKey, customNote) {
            const greeting = pickRandom(variations.greetings);
            const perp = pickRandom(variations.perpDescriptions);
            const verb = pickRandom(variations.activityVerbs);
            const offense = pickRandom(offenseDetails[typeKey] || offenseDetails.general);
            const severity = pickRandom(variations.severityPhrases);
            const action = pickRandom(variations.actionRequests);
            const closing = pickRandom(variations.closingLines);

            // بناء البريد بشكل طبيعي وجديد كل مرة
            let body = `${greeting}

I am writing to report a serious violation of WhatsApp's Terms of Service involving the phone number ${number}.

${perp} ${verb} ${offense}. This activity has been ongoing and represents a clear breach of your platform's policies.

Evidence of these violations is available and can be provided upon request. I have documented multiple instances of this behavior.

${severity}
${action}

${closing}

Number reported: ${number}`;

            if (customNote && customNote.trim() !== '') {
                body += `\n\nAdditional Information: ${customNote.trim()}`;
            }

            // عناوين متغيرة
            const subjects = [
                `🚨 URGENT: REPORT – Violation by ${number}`,
                `⚠️ IMMEDIATE ACTION – WhatsApp ${number}`,
                `🔴 PRIORITY REPORT – Account ${number}`,
                `🚫 ABUSE REPORT – Number ${number}`,
                `📛 POLICY VIOLATION – ${number}`,
                `🛑 EMERGENCY REPORT – ${number}`,
                `🔥 CRITICAL: ${number} Must Be Banned`,
                `⚡ TIME-SENSITIVE – ${number}`
            ];
            const subject = pickRandom(subjects);

            return { subject, body };
        }

        function displayMessage(msg) {
            playClick();
            reportCount++;
            document.getElementById('reportCounter').textContent = `⚡ بلاغ #${reportCount}`;
            const card = document.getElementById('resultCard');
            const bodyEl = document.getElementById('messageBody');
            bodyEl.innerHTML = msg.body.replace(/\n/g, '<br>');
            card.style.display = 'block';
            window.currentMessage = msg;
            setupSendButtons(msg.subject, msg.body);
        }

        function setupSendButtons(subject, body) {
            const encodedSubject = encodeURIComponent(subject);
            const encodedBody = encodeURIComponent(body);

            document.getElementById('sendSupportBtn').onclick = () => {
                playClick();
                window.open(`mailto:${emailTargets.support.email}?subject=${encodedSubject}&body=${encodedBody}`, '_blank');
            };
            document.getElementById('sendAbuseBtn').onclick = () => {
                playClick();
                window.open(`mailto:${emailTargets.abuse.email}?subject=${encodedSubject}&body=${encodedBody}`, '_blank');
            };
            document.getElementById('sendLegalBtn').onclick = () => {
                playClick();
                window.open(`mailto:${emailTargets.legal.email}?subject=${encodedSubject}&body=${encodedBody}`, '_blank');
            };
        }

        document.getElementById('generateBtn').addEventListener('click', () => {
            const number = document.getElementById('targetNumber').value.trim() || '+0000';
            const type = document.getElementById('violationType').value;
            const custom = document.getElementById('customNote').value;
            const msg = generateInfiniteMessage(number, type, custom);
            displayMessage(msg);
            document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });

        document.getElementById('copyMsgBtn').addEventListener('click', () => {
            playClick();
            if (!window.currentMessage) return;
            const fullText = `Subject: ${window.currentMessage.subject}\n\n${window.currentMessage.body}`;
            navigator.clipboard.writeText(fullText).then(() => {
                const btn = document.getElementById('copyMsgBtn');
                btn.textContent = '✅ تم النسخ';
                setTimeout(() => { btn.textContent = '📋 نسخ النص'; }, 2000);
            });
        });
    </script>
</body>
</html>
